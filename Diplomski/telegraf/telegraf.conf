# ============================================================
# Telegraf konfiguracija za ingestion Zeek conn.log u InfluxDB
# ============================================================

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

# ------------------------------------------------------------
# OUTPUT — InfluxDB 2.x
# ------------------------------------------------------------
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"

# ------------------------------------------------------------
# INPUT — Zeek conn.log (JSON)
#
# Relevantna polja za IoC detekciju:
#   ts          — timestamp konekcije
#   uid         — jedinstveni ID sesije
#   id.orig_h   — izvorišni IP
#   id.orig_p   — izvorišni port
#   id.resp_h   — odredišni IP
#   id.resp_p   — odredišni port
#   proto       — protokol (tcp/udp/icmp)
#   service     — detektirani servis (http, dns, ssl...)
#   duration    — trajanje konekcije
#   orig_bytes  — bytes poslan od klijenta
#   resp_bytes  — bytes primljeno od servera
#   conn_state  — stanje konekcije (S0=SYN bez odgovora, REJ=odbijeno, SF=normalno...)
#   missed_bytes — izgubljeni paketi (indikator tuneliranja)
# ------------------------------------------------------------
[[inputs.tail]]
  files = ["/zeek-logs/conn.log"]
  from_beginning = true
  pipe = false
  watch_method = "poll"
  data_format = "json_v2"
  name_override = "zeek_conn"

  # Timestamp iz Zeek loga (Unix epoch s decimalama)
  [[inputs.tail.json_v2]]
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    # Tagovi — koriste se za filtriranje i grupiranje u Grafani
    [[inputs.tail.json_v2.tag]]
      path = "id\\.orig_h"
      rename = "src_ip"

    [[inputs.tail.json_v2.tag]]
      path = "id\\.resp_h"
      rename = "dst_ip"

    [[inputs.tail.json_v2.tag]]
      path = "proto"
      rename = "proto"

    [[inputs.tail.json_v2.tag]]
      path = "service"
      rename = "service"
      optional = true

    [[inputs.tail.json_v2.tag]]
      path = "conn_state"
      rename = "conn_state"
      optional = true

    # Metrike — numeričke vrijednosti za grafove
    [[inputs.tail.json_v2.field]]
      path = "id\\.orig_p"
      rename = "src_port"
      type = "int"

    [[inputs.tail.json_v2.field]]
      path = "id\\.resp_p"
      rename = "dst_port"
      type = "int"

    [[inputs.tail.json_v2.field]]
      path = "duration"
      rename = "duration"
      type = "float"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "orig_bytes"
      rename = "src_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "resp_bytes"
      rename = "dst_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "missed_bytes"
      rename = "missed_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "uid"
      rename = "uid"
      type = "string"
      optional = true
# ------------------------------------------------------------
# INPUT — Zeek notice.log (JSON)
#
# Relevantna polja:
#   ts        — timestamp eventa
#   note      — tip notifikatora (Scan::Port_Scan, SSH::Password_Guessing...)
#   msg       — opis događaja
#   src       — izvorišna adresa (ako postoji)
#   uid       — ID povezane sesije (ako postoji)
# ------------------------------------------------------------
[[inputs.tail]]
  files = ["/zeek-logs/notice.log"]
  from_beginning = true
  pipe = false
  watch_method = "poll"
  data_format = "json_v2"
  name_override = "zeek_notice"

  [[inputs.tail.json_v2]]
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    # Tagovi
    [[inputs.tail.json_v2.tag]]
      path = "note"
      rename = "notice_type"

    [[inputs.tail.json_v2.tag]]
      path = "src"
      rename = "src_ip"
      optional = true

    # Polja
    [[inputs.tail.json_v2.field]]
      path = "msg"
      rename = "message"
      type = "string"

    [[inputs.tail.json_v2.field]]
      path = "uid"
      rename = "uid"
      type = "string"
      optional = true