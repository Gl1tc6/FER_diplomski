# ============================================================
# Telegraf konfiguracija — Elasticsearch output
# Kopija od telegraf.conf, samo output je zamijenjen
# ============================================================

[agent]
  interval = "5s"
  flush_interval = "5s"
  omit_hostname = true

# ------------------------------------------------------------
# OUTPUT — Elasticsearch
# ------------------------------------------------------------
[[outputs.elasticsearch]]
  urls = ["http://elasticsearch:9200"]
  index_name = "zeek-%Y.%m.%d"   # Dnevni indeksi, lako za retention management
  manage_template = true
  template_name = "zeek"
  overwrite_template = false
  timeout = "5s"

# ------------------------------------------------------------
# INPUT — Zeek conn.log (identično kao u telegraf.conf)
# ------------------------------------------------------------
[[inputs.tail]]
  files = ["/zeek-logs/conn.log"]
  from_beginning = true
  pipe = false
  watch_method = "poll"
  data_format = "json_v2"
  name_override = "zeek_conn"

  [[inputs.tail.json_v2]]
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.tail.json_v2.tag]]
      path = "id\\.orig_h"
      rename = "src_ip"

    [[inputs.tail.json_v2.tag]]
      path = "id\\.resp_h"
      rename = "dst_ip"

    [[inputs.tail.json_v2.tag]]
      path = "proto"
      rename = "proto"

    [[inputs.tail.json_v2.tag]]
      path = "service"
      rename = "service"
      optional = true

    [[inputs.tail.json_v2.tag]]
      path = "conn_state"
      rename = "conn_state"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "id\\.orig_p"
      rename = "src_port"
      type = "int"

    [[inputs.tail.json_v2.field]]
      path = "id\\.resp_p"
      rename = "dst_port"
      type = "int"

    [[inputs.tail.json_v2.field]]
      path = "duration"
      rename = "duration"
      type = "float"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "orig_bytes"
      rename = "src_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "resp_bytes"
      rename = "dst_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "missed_bytes"
      rename = "missed_bytes"
      type = "int"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "uid"
      rename = "uid"
      type = "string"
      optional = true

# ------------------------------------------------------------
# INPUT — Zeek notice.log (identično kao u telegraf.conf)
# ------------------------------------------------------------
[[inputs.tail]]
  files = ["/zeek-logs/notice.log"]
  from_beginning = true
  pipe = false
  watch_method = "poll"
  data_format = "json_v2"
  name_override = "zeek_notice"

  [[inputs.tail.json_v2]]
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.tail.json_v2.tag]]
      path = "note"
      rename = "notice_type"

    [[inputs.tail.json_v2.tag]]
      path = "src"
      rename = "src_ip"
      optional = true

    [[inputs.tail.json_v2.field]]
      path = "msg"
      rename = "message"
      type = "string"

    [[inputs.tail.json_v2.field]]
      path = "uid"
      rename = "uid"
      type = "string"
      optional = true
